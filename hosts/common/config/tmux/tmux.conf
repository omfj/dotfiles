# Enable mouse support
set -g mouse on

# Set scrollback history limit
set -g history-limit 10000

# 1-indexed windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 0ms so Escape is instant in Neovim (any delay causes mode-switch lag)
set -sg escape-time 0
set -g focus-events on
# Stay inside tmux when the last window is closed instead of dropping to shell
set -g detach-on-destroy off
# Slightly longer window for -r repeat bindings (pane nav, resize)
set -g repeat-time 600
# Use OSC 52 to sync clipboard with the outer terminal
set -g set-clipboard on

# tmux-256color enables italics, undercurls, strikethrough (needed for Neovim diagnostics)
set -g default-terminal "tmux-256color"
# Pass through true color support from the outer terminal
set -ag terminal-overrides ",xterm-256color:RGB"
setw -g xterm-keys off

# Prefix key configuration
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Split screen bindings
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Switch panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize pane bindings
bind -r C-j resize-pane -D 2
bind -r C-k resize-pane -U 2
bind -r C-h resize-pane -L 2
bind -r C-l resize-pane -R 2

# Move pane
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r H swap-pane -s '{ left-of }'
bind -r L swap-pane -s '{ right-of }'

# Switch windows
bind -r C-S-h previous-window
bind -r C-S-l next-window

# Open in current path
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Rename
bind , command-prompt -I "#{window_name}" -p "rename window to:" "rename-window '%%'"
bind . command-prompt -I "#{session_name}" -p "Rename session to:" "rename-session '%%'"

# Reload tmux configuration
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Copy to clipboard
# For macOS
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy -selection clipboard -i"

# For Arch/Linux
#bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Scroll one line at a time
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down

# Swap windows
bind S command-prompt -p "swap window with:" "swap-window -t '%%'"

# Floating popup panes
# g opens lazygit in the current path
bind g popup -d '#{pane_current_path}' -w 85% -h 85% -E 'lazygit'
# t opens a scratch terminal in the current path
bind t popup -d '#{pane_current_path}' -w 85% -h 85% -E ''

# jellybeans.nvim theme
# accent=#8fbfdc
# secondary=#cf6a4c
# accent_fg=#1f1f1f
# bg=#151515
# fg=#e8e8d3
# border=#404040
# muted=#888888
# dim=#b0b8c0
# bright=#dddddd
set -g mode-style "bg=#8fbfdc,fg=#1f1f1f"

# Status bar
set -g status-bg '#151515'
set -g status-fg '#e8e8d3'
set -g status-interval 1
set -g status-left-length 50
set -g status-right-length 120

# Status left (session)
set -g status-left "#{?client_prefix,#[bg=#cf6a4c],#[bg=#8fbfdc]}#[fg=#1f1f1f,bold] #S #{?client_prefix,#[bg=#151515 fg=#cf6a4c],#[bg=#151515 fg=#8fbfdc]}#[default]"

# Status right (date/time)
set -g status-right "#{battery_color_charge_bg}#{battery_color_charge_fg}#{battery_icon}#{battery_percentage} #[bg=#151515,fg=#b0b8c0] %d %b %Y #[fg=#dddddd] %H:%M #[default]"

# Window status
set -g window-status-format "#{?client_prefix,#[fg=#cf6a4c],#[fg=#888888]} #I:#W #[default]"
set -g window-status-current-format "#{?client_prefix,#[bg=#cf6a4c],#[bg=#8fbfdc]}#[fg=#1f1f1f,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#404040"
set -g pane-active-border-style "fg=#888888"

# Message style
set -g message-style "bg=#8fbfdc,fg=#1f1f1f"
set -g message-command-style "bg=#8fbfdc,fg=#1f1f1f"

# Clock mode
set -g clock-mode-colour '#8fbfdc'

# Allow passthrough of keys to the terminal
set -g allow-passthrough on

set -g extended-keys on

set -as terminal-features 'xterm*:extkeys'

set -g visual-bell off
set -g window-status-activity-style "bg=#151515,fg=#e8a87c,bold"

set-option -g status "on"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'jaclu/tmux-menus'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-battery
set -g @batt_icon_charge_tier8 '█'
set -g @batt_icon_charge_tier7 '▇'
set -g @batt_icon_charge_tier6 '▆'
set -g @batt_icon_charge_tier5 '▅'
set -g @batt_icon_charge_tier4 '▄'
set -g @batt_icon_charge_tier3 '▃'
set -g @batt_icon_charge_tier2 '▂'
set -g @batt_icon_charge_tier1 '▁'
set -g @batt_icon_status_charging '↑'
set -g @batt_icon_status_charged  '·'
set -g @batt_icon_status_discharging ''
set -g @batt_color_charge_primary_tier1 '#cf6a4c'
set -g @batt_color_charge_primary_tier2 '#cf6a4c'
set -g @batt_color_charge_primary_tier3 '#fad07a'
set -g @batt_color_charge_primary_tier4 '#fad07a'
set -g @batt_color_charge_primary_tier5 '#99ad6a'
set -g @batt_color_charge_primary_tier6 '#99ad6a'
set -g @batt_color_charge_primary_tier7 '#99ad6a'
set -g @batt_color_charge_primary_tier8 '#99ad6a'
set -g @batt_color_charge_secondary_tier1 '#151515'
set -g @batt_color_charge_secondary_tier2 '#151515'
set -g @batt_color_charge_secondary_tier3 '#151515'
set -g @batt_color_charge_secondary_tier4 '#151515'
set -g @batt_color_charge_secondary_tier5 '#151515'
set -g @batt_color_charge_secondary_tier6 '#151515'
set -g @batt_color_charge_secondary_tier7 '#151515'
set -g @batt_color_charge_secondary_tier8 '#151515'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
