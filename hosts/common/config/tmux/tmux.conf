# Enable mouse support
set -g mouse on

# Set scrollback history limit
set -g history-limit 10000

# 1-indexed windows and panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# 0ms so Escape is instant in Neovim (any delay causes mode-switch lag)
set -sg escape-time 0
set -g focus-events on
# Stay inside tmux when the last window is closed instead of dropping to shell
set -g detach-on-destroy off
# Slightly longer window for -r repeat bindings (pane nav, resize)
set -g repeat-time 600
# Use OSC 52 to sync clipboard with the outer terminal
set -g set-clipboard on

# tmux-256color enables italics, undercurls, strikethrough (needed for Neovim diagnostics)
set -g default-terminal "tmux-256color"
# Pass through true color support from the outer terminal
set -ag terminal-overrides ",xterm-256color:RGB"
setw -g xterm-keys off

# Transparent background (lets Ghostty background-opacity show through)
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# Prefix key configuration
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Split screen bindings
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Switch panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize pane bindings
bind -r C-j resize-pane -D 2
bind -r C-k resize-pane -U 2
bind -r C-h resize-pane -L 2
bind -r C-l resize-pane -R 2

# Move pane
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r H swap-pane -s '{ left-of }'
bind -r L swap-pane -s '{ right-of }'

# Switch windows
bind -r C-S-h previous-window
bind -r C-S-l next-window

# Open in current path
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# New session
bind + command-prompt -p "new session name:" "new-session -s '%%'"

# Rename
bind , command-prompt -I "#{window_name}" -p "rename window to:" "rename-window '%%'"
bind . command-prompt -I "#{session_name}" -p "Rename session to:" "rename-session '%%'"

# Reload tmux configuration
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Copy to clipboard
# For macOS
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy -selection clipboard -i"

# For Arch/Linux
#bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Scroll one line at a time
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down

# Swap windows
bind S command-prompt -p "swap window with:" "swap-window -t '%%'"

# Close all windows except current
bind X confirm-before -p "kill all other windows? (y/n)" "kill-window -a -t :#{window_index}"

# Floating popup panes
# g opens lazygit in the current path
bind g popup -d '#{pane_current_path}' -w 85% -h 85% -E 'lazygit'
# o opens todo
bind o popup -d '#{pane_current_path}' -w 85% -h 85% -E 'todo'
# b opens btop
bind b popup -d '#{pane_current_path}' -w 85% -h 85% -E 'btop'

# Status bar (non-color settings)
set -g status-position top # top or bottom
set -g status-justify left
# The status-right Git command is a shell pipeline; refreshing every five
# seconds keeps the clock useful without running it continuously.
set -g status-interval 5
set -g status-left ""
set -g status-left-length 0
set -g status-right-length 60
set -g status "on"
set -g visual-bell off

# Colors — defined in ~/.config/zsh/colors.zsh
run-shell 'zsh -c "source ~/.config/zsh/colors.zsh"'

# Allow passthrough of keys to the terminal
set -g allow-passthrough on

set -g extended-keys on

set -as terminal-features 'xterm*:extkeys'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'jaclu/tmux-menus'

set -g @continuum-restore 'on'
set -g @menus_trigger 'm'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
