[general]
live_config_reload = true

[font]
normal = { family = "IosevkaTerm Nerd Font", style = "Regular" }
bold = { family = "IosevkaTerm Nerd Font", style = "Bold" }
italic = { family = "IosevkaTerm Nerd Font", style = "Italic" }
bold_italic = { family = "IosevkaTerm Nerd Font", style = "BoldItalic" }
size = 14.0

[window]
padding = { x = 5, y = 25 }
dynamic_padding = true
decorations = "Transparent"
startup_mode = "SimpleFullscreen"

[cursor]
style = { shape = "Block", blinking = "Always" }

[selection]
save_to_clipboard = true

[scrolling]
history = 100000
multiplier = 3

[mouse]
hide_when_typing = true

[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u0015"

[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u0015"

[colors.primary]
background = "#0a0a0a"
foreground = "#dedede"

[colors.cursor]
text = "#ffffff"
cursor = "#ffa560"

[colors.selection]
text = "#f4f4f4"
background = "#474e91"

[colors.normal]
black = "#929292"
red = "#e27373"
green = "#94b979"
yellow = "#ffba7b"
blue = "#97bedc"
magenta = "#e1c0fa"
cyan = "#00988e"
white = "#dedede"

[colors.bright]
black = "#bdbdbd"
red = "#ffa1a1"
green = "#bddeab"
yellow = "#ffdca0"
blue = "#b1d8f6"
magenta = "#fbdaff"
cyan = "#1ab2a8"
white = "#ffffff"
